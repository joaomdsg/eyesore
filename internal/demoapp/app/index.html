<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>isore demo app</title>
<style>
  body{font:16px/1.5 system-ui,-apple-system,sans-serif;max-width:640px;margin:40px auto;color:#222}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  h1{font-size:22px;margin:0}
  .card{border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px}
  .price{font-size:28px;font-weight:700;color:#111}
  button{font:600 14px/1 system-ui,-apple-system,sans-serif;padding:10px 18px;border-radius:6px;
    border:none;background:#333;color:#fff;cursor:pointer}
  button:hover{background:#555}
  ul{padding-left:20px}
  footer{margin-top:32px;font-size:13px;color:#888}
</style>
</head>
<body>
<header>
  <h1 id="title">Widget Shop</h1>
  <nav><a href="#" id="nav-cart">Cart (0)</a></nav>
</header>

<div class="card" id="product-card">
  <h2 id="product-name">Brass Widget</h2>
  <p class="price" id="product-price">$24.00</p>
  <p id="product-desc">A dependable widget for everyday fastening needs.</p>
  <button id="buy-btn" type="button">Add to cart</button>
</div>

<div class="card" id="features">
  <h2>Features</h2>
  <ul id="feature-list">
    <li>Corrosion-resistant finish</li>
    <li>Fits standard M4 fittings</li>
    <li>Lifetime warranty</li>
  </ul>
</div>

<footer id="footer">isore demo app &middot; fixture for annotation e2e tests</footer>

<script>
  document.getElementById('buy-btn').addEventListener('click', function(){
    var cart = document.getElementById('nav-cart');
    var n = parseInt((cart.textContent.match(/\d+/)||['0'])[0], 10) + 1;
    cart.textContent = 'Cart (' + n + ')';
  });
</script>
</body>
</html>
